<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"
    integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
  <script src="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/js/bootstrap.min.js"></script>
  <title>Document</title>
</head>

<body>
  <div class="container-fluid">
    <!-- TOP SECTION -->
    <div class="row bg-primary text-white p-4">
      <div class="col-12" style="display: flex; gap: 15px; align-items: center;">
        <h1 style="margin: 0;">Header</h1>
        <div class="input-group">
          <input type="text" class="form-control" placeholder="Search...">
          <button class="btn btn-dark">Search</button>
        </div>
      </div>
    </div>

    <!-- BOTTOM SECTION (3 PARTS) -->
    <div class="row">
      <div class="col-md-4 p-4">
        <h3>Section 1</h3>
        <button class="btn btn-primary">Button</button>
        <span class="badge badge-success">New</span>
      </div>
      <div class="col-md-4 p-4">
        <h3>Section 2</h3>
        <div class="btn-group">
          <button class="btn btn-info">Btn1</button>
          <button class="btn btn-info">Btn2</button>
        </div>
      </div>
      <div class="col-md-4 p-4">
        <h3>Section 3</h3>
        <input class="form-control" type="email" placeholder="Email">
      </div>
    </div>

    <div id="carousel" class="carousel slide" data-ride="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <h3>Slide 1</h3>
        </div>
        <div class="carousel-item">
          <h3>Slide 2</h3>
        </div>
      </div>
      <a class="carousel-control-prev" href="#carousel" data-slide="prev">❮</a>
      <a class="carousel-control-next" href="#carousel" data-slide="next">❯</a>
    </div>

    <table class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>Time</th>
          <th>Mon</th>
          <th>Tue</th>
          <th>Wed</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>9-10</td>
          <td>Math</td>
          <td>Science</td>
          <td>English</td>
        </tr>
      </tbody>
    </table>
  </div>
</body>

</html>
