<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bill Generator</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body {
      padding: 30px;
      background: #f5f5f5;
    }

    .form-container {
      background: white;
      padding: 30px;
      border-radius: 8px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      font-weight: bold;
      margin-bottom: 10px;
      display: block;
    }

    select,
    input {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
    }

    .checkbox-group {
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #28a745;
      color: white;
      border: none;
      font-size: 16px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      background: #218838;
    }
  </style>
</head>

<body>
  <div class="form-container">
    <h2>Bill Generator</h2>

    <div class="form-group">
      <label>Select Mobile Brand:</label>
      <select id="brand">
        <option value="0">Select Brand</option>
        <option value="15000">HP - Rs. 15000</option>
        <option value="8000">Nokia - Rs. 8000</option>
        <option value="25000">Samsung - Rs. 25000</option>
        <option value="12000">Motorola - Rs. 12000</option>
        <option value="80000">Apple - Rs. 80000</option>
      </select>
    </div>

    <div class="form-group">
      <label>Select Device Type:</label>
      <div class="checkbox-group">
        <label><input type="checkbox" id="mobile" name="device"> Mobile (+Rs. 5000)</label>
      </div>
      <div class="checkbox-group">
        <label><input type="checkbox" id="laptop" name="device"> Laptop (+Rs. 15000)</label>
      </div>
    </div>

    <div class="form-group">
      <label>Quantity:</label>
      <input type="number" id="quantity" value="1" min="1">
    </div>

    <button id="billBtn">Produce Bill</button>
  </div>

  <script>
    $(document).ready(function () {
      $("#billBtn").click(function () {
        let brandPrice = parseFloat($("#brand").val());
        let quantity = parseInt($("#quantity").val());
        let additionalCost = 0;

        if (brandPrice == 0) {
          alert("Please select a brand!");
          return;
        }

        if ($("#mobile").is(":checked")) {
          additionalCost += 5000;
        }
        if ($("#laptop").is(":checked")) {
          additionalCost += 15000;
        }

        let totalPrice = (brandPrice + additionalCost) * quantity;

        alert("Total Bill: Rs. " + totalPrice + "\n\nBrand Price: Rs. " + brandPrice + "\nAdditional Cost: Rs. " + additionalCost + "\nQuantity: " + quantity);
      });
    });
  </script>
  <div id="animatecontainer" class="container">
    <h1>Table Image</h1>
    <table class="table table-striped table-bordered">
      <thead>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>City</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>City</th>
        </tr>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>City</th>
        </tr>
        <tr>
          <th>Name</th>
          <th>Age</th>
          <th>City</th>
        </tr>
      </tbody>
    </table>
    <img src="https://picsum.photos/200" alt="Sample Image">
    <button id="animatebtn" class="btn btn-primary">Animate</button>
  </div>


</body>

</html>
